<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remember Me - 24H 實時生命還原系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #050811; color: #E0E0E0; }
        .serif-font { font-family: 'Noto Serif TC', serif; }
        .neon-glow { box-shadow: 0 0 30px rgba(34, 211, 238, 0.3); border-color: rgba(34, 211, 238, 0.5); }
        .bg-cyber { background: radial-gradient(circle at top, #0f1a30 0%, #050811 100%); }
        .live-dot { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body class="bg-cyber flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm bg-slate-900/95 rounded-[40px] p-6 border-2 neon-glow relative overflow-hidden">
        
        <div class="flex justify-between items-center text-[10px] text-cyan-400/80 tracking-widest uppercase mb-4">
            <span class="flex items-center gap-1">
                <span class="w-2 h-2 bg-emerald-400 rounded-full live-dot"></span>
                <span id="stream-title">Remember Me 實時通話流</span>
            </span>
            <span id="time-display">00:00</span>
        </div>

        <div class="w-full bg-slate-950 rounded-3xl overflow-hidden border border-slate-800 aspect-[3/4] relative flex flex-col justify-between p-4 shadow-2xl">
            
            <div class="flex justify-between items-start w-full z-10">
                <div class="bg-black/70 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10 max-w-[80%]">
                    <p id="pet-name" class="text-[11px] font-bold text-white tracking-wide">載入中...</p>
                    <p id="current-habit" class="text-[9px] text-cyan-400 truncate">🐾 正在讀取實時作息表...</p>
                </div>
                <span class="bg-emerald-500 text-black text-[9px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">24H LIVE</span>
            </div>

            <div class="absolute inset-0 z-0 flex items-center justify-center">
                <model-viewer 
                    id="pet-model"
                    src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Fox/glTF-Binary/Fox.glb" 
                    alt="Remember Me 3D 還原分身"
                    auto-rotate
                    camera-controls
                    touch-action="pan-y"
                    autoplay
                    animation-name="Survey"
                    shadow-intensity="1"
                    class="w-full h-full bg-transparent">
                </model-viewer>
            </div>

            <div class="w-full flex justify-center gap-6 z-10">
                <button onclick="triggerCall()" class="px-8 py-2.5 rounded-full bg-gradient-to-r from-cyan-400 to-blue-500 hover:from-cyan-300 hover:to-blue-400 text-black font-bold text-xs tracking-widest flex items-center gap-1 shadow-lg shadow-cyan-500/20 transition">
                    📞 呼喚 Lucky
                </button>
            </div>
        </div>

        <div class="text-center mt-4">
            <p class="serif-font text-[11px] italic text-slate-400 tracking-wider">「死亡不是終點，被遺忘了才是」</p>
        </div>
    </div>

    <div class="mt-6 text-center text-[10px] text-slate-500">
        💡 系統每秒自動對齊現實時間。若在雲端展示模式，將自動依時間載入對應生活習慣。
    </div>

    <script>
        const PET_ID = 'lucky_001';
        const model = document.getElementById('pet-model');
        const habitText = document.getElementById('current-habit');
        
        let isLocalDB = false;
        let callActionName = "Run"; 
        let voiceUrl = "";

        async function initSystem() {
            // 1. 每秒更新一次時間顯示
            setInterval(() => {
                const now = new Date();
                document.getElementById('time-display').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            }, 1000);

            // 2. 判斷所處環境
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                isLocalDB = true;
                document.getElementById('stream-title').innerText = "Remember Me 24H 真實資料流";
                syncWithRealTime();
            } else {
                isLocalDB = false;
                document.getElementById('stream-title').innerText = "Remember Me 雲端實時演示";
                runCloudDemoFlow();
            }
        }

        // 本地端邏輯：直接拿當下的 Hour 去向 SQLite 資料庫要精確行為
        async function syncWithRealTime() {
            const currentHour = new Date().getHours();
            try {
                const response = await fetch(`/api/pet/${PET_ID}/time/${currentHour}`);
                const data = await response.json();
                
                document.getElementById('pet-name').innerText = data.name;
                habitText.innerText = data.habit_text;
                model.animationName = data.animation_name;
                callActionName = data.call_animation;
                voiceUrl = data.voice_url;
                
                console.log(`✓ 實時作息同步成功！當前時間：${currentHour}點，執行動作：${data.animation_name}`);
            } catch (e) {
                habitText.innerText = "❌ 無法同步本地實時作息表";
            }
        }

        // 雲端展示邏輯：即使沒有後端，也能依據當下時間展示實時生活感
        function runCloudDemoFlow() {
            document.getElementById('pet-name').innerText = "陳小晃 (Lucky)";
            const currentHour = new Date().getHours();
            
            if (currentHour >= 0 && currentHour < 6) {
                habitText.innerText = "🌙 深夜熟睡時間，Lucky 正在窩在毯子裡香甜地做夢...";
                model.animationName = "Survey";
            } else if (currentHour >= 6 && currentHour < 12) {
                habitText.innerText = "⏰ 早上清醒時間，Lucky 精神飽滿地在客廳慢慢散步巡邏...";
                model.animationName = "Walk";
            } else if (currentHour >= 12 && currentHour < 17) {
                habitText.innerText = "⚡ 下午活力充沛！Lucky 正在客廳開心地小奔跑玩耍...";
                model.animationName = "Run";
            } else {
                habitText.innerText = "🍲 晚餐與陪伴時間，Lucky 正乖巧地坐在客廳四處張望...";
                model.animationName = "Survey";
            }
        }

        function triggerCall() {
            habitText.innerText = '📞 視訊已接通 ‧ 正在從實時軌跡中猛然朝你跑來！';
            model.animationName = callActionName;
            
            const targetVoice = voiceUrl || 'https://www.w3schools.com/html/horse.mp3';
            const audio = new Audio(targetVoice);
            audio.play().catch(e => console.log("等待手動點擊觸發"));
        }

        window.onload = initSystem;
    </script>
</body>
</html>
