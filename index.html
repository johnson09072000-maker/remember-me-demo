<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remember Me - 3D 實時生活視訊系統 PoC</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #050811; color: #E0E0E0; }
        .serif-font { font-family: 'Noto Serif TC', serif; }
        .neon-glow { box-shadow: 0 0 30px rgba(34, 211, 238, 0.3); border-color: rgba(34, 211, 238, 0.5); }
        .bg-cyber { background: radial-gradient(circle at top, #0f1a30 0%, #050811 100%); }
        .live-dot { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body class="bg-cyber flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm bg-slate-900/95 rounded-[40px] p-6 border-2 neon-glow relative overflow-hidden">
        
        <div class="flex justify-between items-center text-[10px] text-cyan-400/80 tracking-widest uppercase mb-4">
            <span class="flex items-center gap-1">
                <span class="w-2 h-2 bg-emerald-400 rounded-full live-dot"></span>
                <span id="stream-title">Remember Me 實時生活流</span>
            </span>
            <span id="time-display">00:00</span>
        </div>

        <div class="w-full bg-slate-950 rounded-3xl overflow-hidden border border-slate-800 aspect-[3/4] relative flex flex-col justify-between p-4 shadow-2xl">
            
            <div class="flex justify-between items-start w-full z-10">
                <div class="bg-black/70 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10 max-w-[80%]">
                    <p id="pet-name" class="text-[11px] font-bold text-white tracking-wide">陳小晃 (Lucky)</p>
                    <p id="current-habit" class="text-[9px] text-cyan-400 truncate">🐾 正在載入生活作息...</p>
                </div>
                <span class="bg-emerald-500 text-black text-[9px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">3D LIVE</span>
            </div>

            <div class="absolute inset-0 z-0 flex items-center justify-center">
                <model-viewer 
                    id="pet-model"
                    src="https://modelviewer.dev/shared-assets/models/Cats.glb" 
                    alt="Remember Me 3D 機器橘貓分身"
                    auto-rotate
                    camera-controls
                    touch-action="pan-y"
                    autoplay
                    animation-name="03_Idle"
                    shadow-intensity="1"
                    class="w-full h-full bg-transparent">
                </model-viewer>
            </div>

            <div class="w-full flex justify-center gap-6 z-10">
                <button onclick="triggerCall()" class="px-8 py-2.5 rounded-full bg-gradient-to-r from-cyan-400 to-blue-500 hover:from-cyan-300 hover:to-blue-400 text-black font-bold text-xs tracking-widest flex items-center gap-1 shadow-lg shadow-cyan-500/20 transition">
                    📞 呼喚 Lucky
                </button>
            </div>
        </div>

        <div class="text-center mt-4">
            <p class="serif-font text-[11px] italic text-slate-400 tracking-wider">「死亡不是終點，被遺忘了才是」</p>
        </div>
    </div>

    <div class="mt-6 flex gap-4 text-xs text-slate-600 bg-slate-900/50 p-3 rounded-xl border border-slate-800">
        <button onclick="changeTimeSlot('morning')" class="hover:text-amber-400 transition">⏰ 變更作息：早上</button>
        <span>|</span>
        <button onclick="changeTimeSlot('afternoon')" class="hover:text-cyan-400 transition">☀️ 變更作息：下午</button>
        <span>|</span>
        <button onclick="changeTimeSlot('night')" class="hover:text-indigo-400 transition">🌙 變更作息：深夜</button>
    </div>

    <script>
        const PET_ID = 'lucky_001';
        const model = document.getElementById('pet-model');
        const habitText = document.getElementById('current-habit');
        
        let isLocalDB = false;
        let callActionName = "01_Run"; 
        let behaviorInterval;

        async function initSystem() {
            document.getElementById('time-display').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                isLocalDB = true;
                document.getElementById('stream-title').innerText = "Remember Me SQLite 資料流";
                loadPetDataFromDB();
            } else {
                isLocalDB = false;
                document.getElementById('stream-title').innerText = "Remember Me 雲端演示流";
                changeTimeSlot('afternoon'); 
            }
        }

        async function loadPetDataFromDB() {
            try {
                const response = await fetch(`/api/pet/${PET_ID}`);
                const data = await response.json();
                document.getElementById('pet-name').innerText = data.name;
                habitText.innerText = data.current_habit_text;
                model.animationName = "03_Idle";
            } catch (e) {
                habitText.innerText = "❌ 本地資料庫連線失敗";
            }
        }

        async function changeTimeSlot(slot) {
            if (isLocalDB) {
                try {
                    await fetch(`/api/pet/time-slot`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: PET_ID, slot: slot })
                    });
                    loadPetDataFromDB();
                } catch (e) {}
            } else {
                clearInterval(behaviorInterval);
                if (slot === 'morning') {
                    habitText.innerText = "🐾 目前狀態：橘貓正在房間裡開心地奔跑...";
                    model.animationName = "01_Run";
                    startRandomBehaviors(['01_Run', '02_Walk']);
                } else if (slot === 'afternoon') {
                    habitText.innerText = "🐾 目前狀態：在客廳曬太陽、慢走四處張望...";
                    model.animationName = "02_Walk";
                    startRandomBehaviors(['02_Walk', '03_Idle']);
                } else if (slot === 'night') {
                    habitText.innerText = "🌙 目前狀態：窩在虛擬沙發角落安靜待機...";
                    model.animationName = "03_Idle"; 
                }
            }
        }

        function startRandomBehaviors(actions) {
            behaviorInterval = setInterval(() => {
                const random = actions[Math.floor(Math.random() * actions.length)];
                model.animationName = random;
            }, 7000);
        }

        function triggerCall() {
            clearInterval(behaviorInterval);
            habitText.innerText = '📞 視訊已接通 ‧ 機器橘貓正在對你搖尾巴！';
            model.animationName = "01_Run";
            
            const audio = new Audio('https://www.w3schools.com/html/horse.mp3');
            audio.play().catch(e => console.log("等待手動點擊"));
        }

        window.onload = initSystem;
    </script>
</body>
</html>
